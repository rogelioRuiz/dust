name: CI — Swift

on:
  push:
    branches: [main]
    paths:
      - 'dust-core-swift/**'
      - 'dust-llm-swift/**'
      - 'dust-onnx-swift/**'
      - 'dust-embeddings-swift/**'
      - 'dust-serve-swift/**'
      - '.github/workflows/ci-swift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dust-core-swift/**'
      - 'dust-llm-swift/**'
      - 'dust-onnx-swift/**'
      - 'dust-embeddings-swift/**'
      - 'dust-serve-swift/**'
      - '.github/workflows/ci-swift.yml'
  workflow_dispatch:

concurrency:
  group: ci-swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight modules: no native submodules, fast SPM resolution.
  # Run in parallel via matrix.
  test-lightweight:
    name: Test ${{ matrix.module }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: dust-core-swift
            repository: rogelioRuiz/dust-core-swift
          - module: dust-onnx-swift
            repository: rogelioRuiz/dust-onnx-swift
          - module: dust-serve-swift
            repository: rogelioRuiz/dust-serve-swift

    steps:
      - name: Checkout ${{ matrix.module }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          path: ${{ matrix.module }}

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: ${{ matrix.module }}/.build
          key: spm-${{ matrix.module }}-${{ runner.os }}-${{ hashFiles(format('{0}/Package.swift', matrix.module), format('{0}/Package.resolved', matrix.module)) }}
          restore-keys: |
            spm-${{ matrix.module }}-${{ runner.os }}-

      - name: swift test
        working-directory: ${{ matrix.module }}
        run: swift test --configuration debug 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.module }}
          path: ${{ matrix.module }}/.build/debug/*.xcresult
          if-no-files-found: ignore

  # dust-llm-swift: embeds llama.cpp as a git submodule compiled from source.
  # First cold build ~15-20 min; warm SPM cache ~3-5 min.
  # Cache key covers Package.swift, Package.resolved, .gitmodules, and the
  # llama.cpp CMakeLists.txt so a submodule bump invalidates correctly.
  test-llm:
    name: Test dust-llm-swift
    runs-on: macos-14

    steps:
      - name: Checkout dust-llm-swift (with llama.cpp submodule)
        uses: actions/checkout@v4
        with:
          repository: rogelioRuiz/dust-llm-swift
          path: dust-llm-swift
          submodules: recursive

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache SPM artifacts (includes llama.cpp objects)
        uses: actions/cache@v4
        with:
          path: dust-llm-swift/.build
          key: spm-dust-llm-swift-${{ runner.os }}-${{ hashFiles('dust-llm-swift/Package.swift', 'dust-llm-swift/Package.resolved', 'dust-llm-swift/.gitmodules') }}
          restore-keys: |
            spm-dust-llm-swift-${{ runner.os }}-

      - name: swift test
        working-directory: dust-llm-swift
        run: swift test --configuration debug 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dust-llm-swift
          path: dust-llm-swift/.build/debug/*.xcresult
          if-no-files-found: ignore

  # dust-embeddings-swift: SPM fetches dust-llm-swift (branch: main) which
  # triggers its own llama.cpp compile internally. Warm SPM cache is fast.
  test-embeddings:
    name: Test dust-embeddings-swift
    runs-on: macos-14

    steps:
      - name: Checkout dust-embeddings-swift
        uses: actions/checkout@v4
        with:
          repository: rogelioRuiz/dust-embeddings-swift
          path: dust-embeddings-swift

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: dust-embeddings-swift/.build
          key: spm-dust-embeddings-swift-${{ runner.os }}-${{ hashFiles('dust-embeddings-swift/Package.swift', 'dust-embeddings-swift/Package.resolved') }}
          restore-keys: |
            spm-dust-embeddings-swift-${{ runner.os }}-

      - name: swift test
        working-directory: dust-embeddings-swift
        run: swift test --configuration debug 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dust-embeddings-swift
          path: dust-embeddings-swift/.build/debug/*.xcresult
          if-no-files-found: ignore
